# CI/CD Pipeline for HA Dashboard Builder
# Runs tests, linting, and builds on every push/PR

name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest-cov pytest-xdist
      
      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
  
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/.coverage.xml
        if: false  # Skip for now, will add token later

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install linting tools
        run: |
          pip install flake8 black mypy
      
      - name: Run flake8
        run: |
          cd backend
          flake8 app/ tests/ --max-line-length=120 --ignore=E501,W503
      
      - name: Check code formatting with black
        run: |
          black --check --target-version py311 backend/app/ backend/tests/

  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install build
      
      - name: Build backend package
        run: |
          cd backend
          python -m build
