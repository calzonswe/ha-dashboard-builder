name: Frontend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "18"

jobs:
  test:
    name: Build & type-check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "frontend"  # npm cache directory inside frontend/

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
        continue-on-error: false

      - name: Run type check (tsc)
        working-directory: ./frontend
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build
        continue-on-error: false

      # Optional: Run linting if eslint config exists
      - name: Run ESLint (if configured)
        working-directory: ./frontend
        id: lint
        run: |
          if [ -f "eslint.config.js" ] || [ -f ".eslintrc*" ]; then
            npx eslint src/ --ext .ts,.tsx --max-warnings=0
          else
            echo "::warning::No ESLint configuration found — skipping lint step."
          fi
        continue-on-error: true
