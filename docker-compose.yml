# ---------------------------------------------------------------------------
# Docker Compose for HA Dashboard Builder (Production)
# ---------------------------------------------------------------------------
# Spins up: PostgreSQL, Backend (FastAPI), Frontend (React + Nginx)
# Run with: docker compose up --build -d
#
# Access points:
#   Frontend UI : http://localhost:3000
#   API docs    : http://localhost:8000/docs
# ---------------------------------------------------------------------------

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ha-dashboard-db
    environment:
      POSTGRES_DB: ha_dashboard
      POSTGRES_USER: hadb_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hadb_user -d ha_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ──────────────────────────────────────────────
  ha-dashboard-api:
    build: .
    container_name: ha-dashboard-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://hadb_user:${DB_PASSWORD:-change-me-in-production}@postgres:5432/ha_dashboard
      - HA_HOST=${HA_HOST:-localhost}
      - HA_PORT=${HA_PORT:-8123}
      - HA_ACCESS_TOKEN=${HA_ACCESS_TOKEN}
      - WS_POLL_INTERVAL=${WS_POLL_INTERVAL:-5.0}
      - JWT_SECRET=${JWT_SECRET:-change-jwt-secret-in-production}
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Frontend (React + Nginx) ───────────────────────────────────────
  ha-dashboard-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ha-dashboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - ha-dashboard-api
    restart: unless-stopped

volumes:
  postgres_data: