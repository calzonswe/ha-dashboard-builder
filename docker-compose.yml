# ---------------------------------------------------------------------------
# Docker Compose for HA Dashboard Builder
# ---------------------------------------------------------------------------
# Spins up both backend (FastAPI) and frontend (React + Nginx) with a single
# command:  docker compose up --build -d
#
# Access points:
#   Frontend UI : http://localhost:3000
#   API docs    : http://localhost:8000/docs
# ---------------------------------------------------------------------------

services:
  # ─── Backend (FastAPI) ──────────────────────────────────────────────
  ha-dashboard-api:
    build: .
    container_name: ha-dashboard-api
    ports:
      - "8000:8000"
    environment:
      # Home Assistant connection (set in .env file)
      - HA_HOST=${HA_HOST:-localhost}
      - HA_PORT=${HA_PORT:-8123}
      - HA_ACCESS_TOKEN=${HA_ACCESS_TOKEN}

      # WebSocket poll interval (seconds)
      - WS_POLL_INTERVAL=${WS_POLL_INTERVAL:-5.0}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

    volumes:
      # Persist dashboard DB across container restarts
      - ha-dashboard-data:/app/data

volumes:
  ha-dashboard-data:

  # ─── Frontend (React + Nginx) ───────────────────────────────────────
  ha-dashboard-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ha-dashboard-frontend
    ports:
      - "3000:80"
    # Frontend depends on backend being available for API proxying
    depends_on:
      - ha-dashboard-api
